<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-container" class="container">
        <div class="login-card">
            <h2>Login to Chat</h2>
            <form id="login-form">
                <input type="password" id="password" placeholder="Enter password" required>
                <button type="submit">Login</button>
            </form>
            <div id="login-error" class="error"></div>
        </div>
    </div>

    <div id="chat-container" class="container hidden">
        <div class="chat-header">
            <h2>Simple Chat</h2>
            <div class="device-info" id="device-info"></div>
            <button id="logout-btn">Logout</button>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search messages..." autocomplete="off">
                <button id="search-btn">Search</button>
                <button id="clear-search-btn" class="hidden">Clear</button>
            </div>
            <div id="search-results-info" class="search-info hidden"></div>
        </div>
        
        <div class="messages-container">
            <div id="messages"></div>
            <div id="search-results" class="search-results hidden"></div>
        </div>
        
        <button id="scroll-bottom-btn" class="floating-btn hidden" aria-label="Scroll to bottom">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <polyline points="19 12 12 19 5 12"></polyline>
            </svg>
        </button>
        
        <div class="input-container">
            <form id="message-form">
                <div class="input-wrapper">
                    <button type="button" id="file-btn" class="input-action-btn" title="Attach file">📎</button>
                    <textarea id="message-input" placeholder="Type a message..." autocomplete="off" rows="1"></textarea>
                    <button type="submit" id="send-btn" class="input-action-btn" title="Send message">➤</button>
                </div>
                <input type="file" id="file-input" multiple accept="image/*,.pdf,.txt,.doc,.docx,.zip" style="display: none;">
            </form>
            <div id="file-preview" class="file-preview hidden"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
